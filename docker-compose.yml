services:
  postgres:
    image: postgres:16
    container_name: divvy_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - divvy_pgdata:/var/lib/postgresql/data

volumes:
  divvy_pgdata:
