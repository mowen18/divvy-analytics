services:
  airflow:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    # `airflow standalone` generates a random admin password when it creates
    # the user itself, ignoring _AIRFLOW_WWW_USER_*. Create/reset the user
    # before handing off so the documented login (admin/airflow by default,
    # overridable via AIRFLOW_WWW_USER_* in .env) survives container
    # recreation.
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com
        airflow users reset-password \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}"
        exec airflow standalone
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-airflow}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      DBT_POSTGRES_HOST: host.docker.internal
      DBT_POSTGRES_PORT: "5432"
      DBT_PROFILES_DIR: /opt/divvy-analytics/airflow/dbt_profiles
      DIVVY_PROJECT_DIR: /opt/divvy-analytics
      DIVVY_PYTHON_BIN: python
    ports:
      - "8080:8080"
    volumes:
      - ../:/opt/divvy-analytics
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
