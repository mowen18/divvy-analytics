version: 2

models:
  - name: int_trips
    description: >
      Trip-grain incremental table materializing stg_divvy_trips one
      source_month at a time (delete+insert partition replace, mirroring
      ingestion). Deliberately parallels the legacy analytics.stg_trips table
      — same architecture, now with lineage, tests, docs, and incremental
      loading. Data tests live here rather than on the staging view so they
      scan the materialized table instead of re-casting raw text. Incremental
      runs require the source_month var; a full refresh (or first run)
      rebuilds all months and needs no var.
    columns:
      - name: source_month
        description: Ingestion month tag (YYYYMM, text); the partition-replace unit.
      - name: ride_id
        description: Unique identifier for each trip.
        tests:
          - not_null
          - unique
      - name: started_at
        description: Timestamp when the trip started.
        tests:
          - not_null
      - name: member_casual
        description: >
          Rider membership type ('member'/'casual'). NULL when the raw value
          is unknown — the cleaning rule allows this, so there is deliberately
          no not_null test.
        tests:
          - accepted_values:
              arguments:
                values: ['member', 'casual']

  - name: int_station_activity_monthly
    description: >
      Station activity per (source_month, start_station_name), incremental
      delete+insert on source_month. Grain determines incremental strategy:
      the all-time station mart needs global aggregates (window percentages,
      all-time min/max), which cannot be updated one month at a time — so the
      monthly grain lives here incrementally, and mart_station_activity is a
      cheap full rollup over this table.

      The month here is the source-file tag, not the calendar month of
      started_at: each raw monthly file carries a small tail of trips that
      started on the previous month's last day (8-387 per month across
      202407-202506, ~0.02% of trips), and those land in the following
      bucket. Deliberate: the delete and the recompute then scope the same
      self-contained partition, so single-month reruns are idempotent —
      unlike a calendar-month grain, which would need the mart_trips_daily
      cross-partition recompute. mart_station_activity is insensitive to the
      attribution because it aggregates each station across all months.

      Note the cross-model consequence: mart_trips_daily attributes trips by
      calendar started_at date, while these monthly buckets attribute by
      source file — so comparing a month's trips across the two models will
      differ by the spillover tail (up to ~387 trips/month in 202407-202506).
      Both are correct, by two different definitions of month.
    tests:
      - unique:
          arguments:
            column_name: "source_month || '|' || start_station_name"
    columns:
      - name: source_month
        description: >
          Ingestion month tag (YYYYMM, text); the partition-replace unit.
          Reflects the source file, not the calendar month of started_at —
          a station-month bucket can include trips that started on the last
          day of the previous calendar month.
        tests:
          - not_null
      - name: start_station_name
        description: Name of the station where trips started.
        tests:
          - not_null
      - name: trip_starts
        description: Trips started at this station in this month.
        tests:
          - not_null
      - name: member_trip_starts
        description: Member trips started at this station in this month.
      - name: casual_trip_starts
        description: Casual trips started at this station in this month.
      - name: first_trip_started_at
        description: First trip start at this station within the month.
      - name: last_trip_started_at
        description: Last trip start at this station within the month.
