version: 2

models:
  - name: mart_trips_daily
    description: >
      Daily Divvy trip metrics aggregated from int_trips. Incremental
      delete+insert on trip_date: a monthly run recomputes only the dates in
      that source_month's batch. Grain determines incremental strategy — a
      daily grain maps cleanly onto month-sized batches, so this mart can be
      incremental directly (unlike the all-time station mart).
    columns:
      - name: trip_date
        description: Calendar date of trip start.
        tests:
          - not_null
          - unique

      - name: total_trips
        description: Total number of valid trips starting on this date.
        tests:
          - not_null

      - name: member_trips
        description: Number of trips by annual members.

      - name: casual_trips
        description: Number of trips by casual riders.

      - name: avg_trip_duration_minutes
        description: Average trip duration in minutes for valid trips on this date.
  - name: mart_station_activity
    description: >
      All-time station-level trip start metrics, rolled up from
      int_station_activity_monthly. Stays a plain table: its global window
      percentage and all-time min/max can't be updated one month at a time,
      but the input is already month/station-aggregated, so the full rebuild
      is cheap. Output schema is unchanged from the previous staging-based
      version.
    columns:
      - name: start_station_name
        description: Name of the station where trips started.
        tests:
          - not_null
          - unique

      - name: trip_starts
        description: Total number of trips that started at this station.
        tests:
          - not_null

      - name: member_trip_starts
        description: Number of member trips that started at this station.

      - name: casual_trip_starts
        description: Number of casual rider trips that started at this station.

      - name: pct_of_all_trip_starts
        description: Percentage of all station-based trip starts represented by this station.

      - name: first_trip_started_at
        description: First observed trip start timestamp for this station.

      - name: last_trip_started_at
        description: Last observed trip start timestamp for this station.